<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartToolsHub - Free Online Calculators</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background:#f5f7fb;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
margin:20px auto;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:5px;
width:80%;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

footer{
margin-top:40px;
padding:20px;
background:#111827;
color:white;
}

</style>

</head>

<body>

<header>
SmartToolsHub
</header>

<div class="container">

<h2>Free Smart Calculators</h2>
<p>Simple tools that make life easier</p>

<div class="card">

<h3>Compound Interest Calculator</h3>

<input id="principal" placeholder="Initial Amount"><br>
<input id="monthly" placeholder="Monthly Contribution"><br>
<input id="rate" placeholder="Interest Rate (%)"><br>
<input id="years" placeholder="Years"><br>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

</div>

<footer>
SmartToolsHub © 2026 | Free Online Tools
</footer>

<script>

function calculate(){

let principal = parseFloat(document.getElementById("principal").value) || 0;
let monthly = parseFloat(document.getElementById("monthly").value) || 0;
let rate = parseFloat(document.getElementById("rate").value)/100/12 || 0;
let years = parseFloat(document.getElementById("years").value)*12 || 0;

let total = principal;

for(let i=0;i<years;i++){
total = total*(1+rate)+monthly;
}

document.getElementById("result").innerHTML =
"Total Value: $" + total.toFixed(2);

}

</script>

</body>
</html>
