<head>

<style>

body{
font-family: Arial, sans-serif;

margin:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
margin:20px auto;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

input{

button{
background:#2563eb;

}

margin-top:40px;

background:#111827;

</head>

<body>

<header>
SmartToolsHub
</header>

<div class="container">

<h2>Free Smart Calculators</h2>
<p>Simple tools that make life easier</p>

<div class="card">

<h3>Compound Interest Calculator</h3>

<input id="principal" placeholder="Initial Amount"><br>
<input id="monthly" placeholder="Monthly Contribution"><br>
<input id="rate" placeholder="Interest Rate (%)"><br>
<input id="years" placeholder="Years"><br>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

  <div class="card">

<h3>Age Calculator</h3>

<input type="date" id="birthdate"><br>

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="ageResult"></div>

</div>

</div>


<footer>
SmartToolsHub © 2026 | Free Online Tools
</footer>

<script>

<script>

function calculateAge(){

let birthdate = document.getElementById("birthdate").value;

if(!birthdate){
document.getElementById("ageResult").innerHTML =
"Please select a date";
return;
}

let birth = new Date(birthdate);
let today = new Date();

let years = today.getFullYear() - birth.getFullYear();
let months = today.getMonth() - birth.getMonth();
let days = today.getDate() - birth.getDate();

if(days < 0){
months--;
days += 30;
}

if(months < 0){
years--;
months += 12;
}

document.getElementById("ageResult").innerHTML =
years + " Years " + months + " Months " + days + " Days";

}

</script>
